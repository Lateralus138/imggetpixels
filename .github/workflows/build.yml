name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_STATIC=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Test (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: ./build/imggetpixels --version

    - name: Test (Windows)
      if: matrix.os == 'windows-latest'
      run: ./build/Release/imggetpixels.exe --version

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: imggetpixels-${{ matrix.os }}
        path: ${{ matrix.os == 'windows-latest' && 'build/Release/imggetpixels.exe' || 'build/imggetpixels' }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Rename and Prepare Binaries
      run: |
        echo "Listing all files for debugging:"
        find . -maxdepth 3 -not -path '*/.*'
        
        # Move Linux binary if it exists
        if [ -f "imggetpixels" ]; then
          mv imggetpixels imggetpixels-linux
        elif [ -f "build/imggetpixels" ]; then
          mv build/imggetpixels imggetpixels-linux
        fi

        # Move Windows binary if it exists
        if [ -f "imggetpixels.exe" ]; then
          mv imggetpixels.exe imggetpixels-windows.exe
        elif [ -f "Release/imggetpixels.exe" ]; then
          mv Release/imggetpixels.exe imggetpixels-windows.exe
        elif [ -f "build/Release/imggetpixels.exe" ]; then
          mv build/Release/imggetpixels.exe imggetpixels-windows.exe
        fi

        # Final check
        ls -lh imggetpixels-linux imggetpixels-windows.exe || true

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          imggetpixels-linux
          imggetpixels-windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
